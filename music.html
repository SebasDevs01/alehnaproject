<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALEHNA | Música</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css?v=14">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { pastelBeige: '#F9F6F0', pastelBeigeDark: '#EAE3D5', pastelCafe: '#A8866E', pastelVino: '#C57D84', darkText: '#4A3E38' },
                    fontFamily: { sans: ['Nunito', 'sans-serif'], hand: ['Caveat', 'cursive'], marker: ['Permanent Marker', 'cursive'] }
                }
            }
        }
    </script>
    <style>
        .spin-vinyl-auto { animation: spin-vinyl-auto 4s linear infinite; }
        @keyframes spin-vinyl-auto {
            from { transform: translateX(12px) rotate(0deg); }
            to { transform: translateX(12px) rotate(360deg); }
        }
    </style>
</head>
<body class="bg-pastelBeige text-darkText font-sans transition-colors duration-300">

    <!-- WRAPPER STICKY (BANNER + HEADER) -->
    <div class="sticky top-0 w-full z-[150] shadow-sm flex flex-col">
        <div class="w-full bg-pastelBeige border-b border-pastelCafe h-[53px] grid items-center px-3 md:px-6 text-pastelCafe text-xs" style="grid-template-columns: auto 1fr auto; gap: 12px;">
            <div class="flex items-center gap-8 flex-shrink-0">
                <div class="relative flex-shrink-0 ml-1" style="width:35px;height:32px;">
                    <div class="absolute top-0 right-0 w-8 h-8 rounded-full border border-gray-600 flex items-center justify-center spin-vinyl-auto z-0" style="background:conic-gradient(from 0deg,#181514 0%,#4a403d 10%,#181514 20%,#181514 40%,#4a403d 50%,#181514 60%,#181514 90%,#4a403d 100%);">
                        <img src="almas/Portada2.jpg.jpeg" class="w-1/3 h-1/3 rounded-full border border-white/50">
                        <div class="absolute w-1 h-1 bg-white rounded-full"></div>
                    </div>
                    <div class="absolute top-0 left-0 w-8 h-8 bg-cover bg-center z-10 rounded-sm border border-white/30 shadow" style="background-image:url('almas/Portada2.jpg.jpeg');"></div>
                </div>
                <span class="font-marker text-pastelVino text-xs sm:text-sm whitespace-nowrap leading-none self-center">ALMAS</span>
            </div>
            <div class="flex items-center justify-center gap-2 md:gap-4 font-main">
                <div class="flex items-baseline gap-0.5">
                    <span id="days" class="text-pastelVino font-bold text-sm md:text-base">00</span>
                    <span class="text-[7px] uppercase text-pastelCafe tracking-wide">días</span>
                </div>
                <span class="text-pastelCafe/30 text-[10px]">·</span>
                <div class="flex items-baseline gap-0.5">
                    <span id="hours" class="text-pastelVino font-bold text-sm md:text-base">00</span>
                    <span class="text-[7px] uppercase text-pastelCafe tracking-wide">hrs</span>
                </div>
                <span class="text-pastelCafe/30 text-[10px]">·</span>
                <div class="flex items-baseline gap-0.5">
                    <span id="minutes" class="text-pastelVino font-bold text-sm md:text-base">00</span>
                    <span class="text-[7px] uppercase text-pastelCafe tracking-wide">min</span>
                </div>
                <span class="text-pastelCafe/30 text-[10px]">·</span>
                <div class="flex items-baseline gap-0.5">
                    <span id="seconds" class="text-pastelVino font-bold text-sm md:text-base">00</span>
                    <span class="text-[7px] uppercase text-pastelCafe tracking-wide">seg</span>
                </div>
            </div>
            <div class="flex items-center justify-end flex-shrink-0">
                <a href="https://www.youtube.com/@ALEHNAOFICIAL" target="_blank" class="w-8 h-8 rounded-full flex items-center justify-center border-2 border-pastelCafe text-pastelVino hover:bg-pastelVino hover:text-white hover:border-pastelVino transition-all shadow-sm bg-white">
                    <i class="fa-brands fa-youtube text-sm"></i>
                </a>
            </div>
        </div>

        <header id="header" class="w-full bg-pastelBeige/95 backdrop-blur-sm border-b-2 border-pastelCafe shadow-md h-[70px] md:h-[80px] flex items-center">
            <div class="container mx-auto px-4 w-full flex items-center justify-between">
                <a href="index.html" class="text-3xl font-marker text-pastelVino tracking-wider hover:text-pastelCafe transition-colors mt-1">Alehna</a>
                <nav id="desktop-nav" class="hidden md:flex gap-8 font-bold text-sm tracking-widest text-darkText uppercase items-center pt-2">
                    <a href="music.html" class="text-pastelVino font-bold border-b-2 border-pastelVino transition-colors px-2 py-1">Música</a>
                    <a href="videos.html" class="hover:text-pastelVino transition-colors px-2 py-1">Videos</a>
                    <a href="biografia.html" class="hover:text-pastelVino transition-colors px-2 py-1">Biografía</a>
                    <a href="lanzamientos.html" class="hover:text-pastelVino transition-colors px-2 py-1">Lanzamientos</a>
                    <a href="merch.html" class="hover:text-pastelVino transition-colors px-2 py-1">Merch</a>
                    <a href="contacto.html" class="hover:text-pastelVino transition-colors px-2 py-1">Contacto</a>
                    <a href="index.html#newsletter" class="bg-pastelVino text-white hover:bg-pastelCafe rounded-md px-4 py-1.5 transition-colors shadow-sm">Únete</a>
                </nav>
                <div class="flex items-center gap-4 pt-1">
                    <div class="hidden md:flex gap-3 text-lg text-pastelCafe">
                        <a target="_blank" href="https://www.instagram.com/alehnaoficial?igsh=MTI2Y3NidGhpaXFiaQ==" class="hover:text-pastelVino transition"><i class="fa-brands fa-instagram"></i></a>
                        <a target="_blank" href="https://www.tiktok.com/@alehnaoficial?_r=1&_t=ZS-95T2zD8JSjt" class="hover:text-pastelVino transition"><i class="fa-brands fa-tiktok"></i></a>
                        <a target="_blank" href="https://www.youtube.com/@ALEHNAOFICIAL" class="hover:text-pastelVino transition"><i class="fa-brands fa-youtube"></i></a>
                    </div>
                    <button onclick="toggleCart()" class="relative text-xl md:text-2xl text-pastelVino hover:text-pastelCafe focus:outline-none transition-colors mr-2 md:mr-4">
                        <i class="fa-solid fa-cart-shopping"></i>
                        <span id="cart-count" class="absolute -top-2 -right-3 bg-pastelCafe text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full font-bold shadow hidden">0</span>
                    </button>
                    <button id="mobile-menu-btn" class="md:hidden text-3xl text-pastelVino hover:text-pastelCafe focus:outline-none">
                        <i class="fa-solid fa-bars"></i>
                    </button>
                </div>
            </div>
        </header>
    </div>

    <!-- MOBILE MENU RESPONSIVE -->
    <div id="mobile-menu" class="fixed inset-0 z-[200] bg-pastelBeige/98 backdrop-blur-xl flex-col items-center justify-center space-y-8 hidden pt-12 transform transition-transform duration-300">
        <button onclick="toggleMenu()" class="absolute top-6 right-6 text-4xl text-pastelCafe hover:text-pastelVino"><i class="fa-solid fa-xmark"></i></button>
        <a href="index.html" onclick="toggleMenu()" class="font-marker text-4xl text-pastelVino mb-4 hover:text-pastelCafe transition-colors">Alehna</a>
        <a href="index.html#music" class="text-3xl font-bold font-hand text-darkText hover:text-pastelVino uppercase" onclick="toggleMenu()">Música</a>
        <a href="videos.html" class="text-3xl font-bold font-hand text-darkText hover:text-pastelVino uppercase" onclick="toggleMenu()">Videos</a>
        <a href="biografia.html" class="text-3xl font-bold font-hand text-darkText hover:text-pastelVino uppercase" onclick="toggleMenu()">Biografía</a>
        <a href="lanzamientos.html" class="text-3xl font-bold font-hand text-darkText hover:text-pastelVino uppercase" onclick="toggleMenu()">Lanzamientos</a>
        <a href="merch.html" class="text-3xl font-bold font-hand text-darkText hover:text-pastelVino uppercase" onclick="toggleMenu()">Merch</a>
        <a href="contacto.html" class="text-3xl font-bold font-hand text-darkText hover:text-pastelVino uppercase" onclick="toggleMenu()">Contacto</a>
        <a href="index.html#newsletter" class="bg-pastelVino text-white px-8 py-3 rounded-full font-bold uppercase mt-6" onclick="toggleMenu()">Únete</a>
    </div>

    <main class="flex-grow pt-[130px] pb-20 px-4 relative z-10 overflow-hidden">
        <div class="container mx-auto max-w-6xl text-center mt-12">
            <h1 class="text-5xl md:text-7xl font-marker text-pastelCafe mb-16 inline-block transform rotate-1">MÚSICA</h1>
            <div class="mt-4 organic-box p-4 bg-white max-w-4xl mx-auto shadow-md">
                <iframe style="border-radius:12px;" src="https://open.spotify.com/embed/track/6WCIljsn5rcWF699Siq2TM?utm_source=generator" width="100%" height="152" frameBorder="0" loading="eager"></iframe>
            </div>
        </div>
    </main>

    <footer id="footer" class="bg-pastelCafe text-pastelBeige py-12 relative mt-12 bg-pastelBeigeDark">
        <div class="container mx-auto px-4 mt-8 flex flex-col items-center">
            <div class="text-center font-main text-sm font-bold opacity-80 mt-4">© 2026 ALEHNA. TODOS LOS DERECHOS RESERVADOS.</div>
        </div>
    </footer>

    <script src="main.js?v=20260424"></script>
    <script>
        // Menu and toggles defined in main.js
    </script>
    <!-- CART SIDEBAR & OVERLAY -->
    <div id="cart-overlay" class="fixed inset-0 bg-black/40 z-[250] hidden transition-opacity backdrop-blur-sm" onclick="toggleCart()"></div>
    <div id="cart-sidebar" class="fixed top-0 right-0 h-full w-full sm:w-[400px] bg-pastelBeige z-[300] transform translate-x-full transition-transform duration-300 shadow-2xl flex flex-col border-l-4 border-pastelCafe">
        <div class="p-6 border-b border-pastelCafe flex justify-between items-center bg-white">
            <h3 class="text-2xl font-bold font-marker text-darkText">TU CARRITO</h3>
            <button onclick="toggleCart()" class="text-4xl text-pastelCafe hover:text-pastelVino"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto p-6 font-main"></div>
        <div class="p-6 bg-white border-t border-pastelCafe shadow-[0_-10px_20px_rgba(0,0,0,0.05)]">
            <div class="flex justify-between items-center mb-6">
                <span class="text-xl font-bold text-darkText font-hand">TOTAL:</span>
                <span id="cart-total" class="text-3xl font-bold text-pastelVino">$0</span>
            </div>
            <button onclick="checkoutCart()" class="w-full py-4 text-xl bg-pastelVino text-white hover:bg-pastelCafe transition-colors font-bold rounded-xl shadow-md border-2 border-transparent">
                <i class="fa-brands fa-whatsapp text-2xl mr-2 align-middle"></i><span class="align-middle">Hacer Pedido</span>
            </button>
        </div>
    </div>
</body>
</html>
