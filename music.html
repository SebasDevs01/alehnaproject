<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALEHNA | Música</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css?v=14">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { pastelBeige: '#F9F6F0', pastelBeigeDark: '#EAE3D5', pastelCafe: '#A8866E', pastelVino: '#C57D84', darkText: '#4A3E38' },
                    fontFamily: { sans: ['Nunito', 'sans-serif'], hand: ['Caveat', 'cursive'], marker: ['Permanent Marker', 'cursive'] }
                }
            }
        }
    </script>
    <style>
        .spin-vinyl-auto { animation: spin-vinyl-auto 4s linear infinite; }
        @keyframes spin-vinyl-auto {
            from { transform: translateX(12px) rotate(0deg); }
            to { transform: translateX(12px) rotate(360deg); }
        }
    </style>
</head>
<body class="bg-pastelBeige text-darkText font-sans transition-colors duration-300">

    <!-- WRAPPER FIXED (BANNER + HEADER) -->
    <div class="fixed top-0 left-0 w-full z-[150] shadow-sm flex flex-col">
        <div class="w-full bg-pastelBeige border-b border-pastelCafe h-[53px] grid grid-cols-3 items-center px-2 md:px-4 text-pastelCafe text-xs">
            <div class="flex items-center justify-start gap-2">
                <div class="relative w-8 h-8 md:w-10 md:h-10 ml-2 hidden sm:block mt-0.5">
                    <div class="absolute inset-0 rounded-full border border-gray-600 bg-gray-900 flex items-center justify-center shadow-md spin-vinyl-auto z-0" style="transform: translateX(8px);">
                        <img src="almas/Portada2.jpg.jpeg" class="w-1/3 h-1/3 rounded-full border border-white/50">
                        <div class="absolute w-1 h-1 bg-white rounded-full"></div>
                    </div>
                    <div class="absolute inset-0 bg-white border border-gray-300 shadow bg-cover bg-center z-10 rounded-sm" style="background-image: url('almas/Portada2.jpg.jpeg');"></div>
                </div>
                <span class="font-marker tracking-widest text-pastelVino md:text-sm lg:block mt-1 hidden sm:block">ALMAS</span>
            </div>

            <div class="flex items-center justify-center gap-1 md:gap-3 font-bold tracking-widest font-main">
                <div class="flex items-center gap-1"><span id="days" class="text-pastelVino text-sm md:text-base">00</span></div><span class="hidden sm:inline">:</span>
                <div class="flex items-center gap-1"><span id="hours" class="text-pastelVino text-sm md:text-base">00</span></div><span class="hidden sm:inline">:</span>
                <div class="flex items-center gap-1"><span id="minutes" class="text-pastelVino text-sm md:text-base">00</span></div><span class="hidden sm:inline">:</span>
                <div class="flex items-center gap-1"><span id="seconds" class="text-pastelVino text-sm md:text-base">00</span></div>
            </div>

            <div class="flex justify-end pr-2">
                <a href="https://www.youtube.com/@ALEHNAOFICIAL" target="_blank" class="px-3 md:px-4 py-1.5 rounded-full text-[10px] md:text-xs font-bold flex items-center gap-2 transition-all border-2 border-pastelCafe text-pastelCafe hover:bg-pastelVino hover:text-white hover:border-pastelVino shadow-sm bg-white group">
                    <i class="fa-brands fa-youtube text-sm md:text-base text-pastelVino group-hover:text-white transition-colors"></i> <span class="hidden md:inline">YOUTUBE</span>
                </a>
            </div>
        </div>

        <header id="header" class="w-full bg-pastelBeige/95 backdrop-blur-sm border-b-2 border-pastelCafe shadow-md h-[70px] md:h-[80px] flex items-center">
            <div class="container mx-auto px-4 w-full flex items-center justify-between">
                <a href="index.html" class="text-3xl font-marker text-pastelVino tracking-wider hover:text-pastelCafe transition-colors mt-1">Alehna</a>
                <nav id="desktop-nav" class="hidden md:flex gap-8 font-bold text-sm tracking-widest text-darkText uppercase items-center pt-2">
                    <a href="music.html" class="text-pastelVino font-bold border-b-2 border-pastelVino transition-colors px-2 py-1">Música</a>
                    <a href="videos.html" class="hover:text-pastelVino transition-colors px-2 py-1">Videos</a>
                    <a href="biografia.html" class="hover:text-pastelVino transition-colors px-2 py-1">Biografía</a>
                    <a href="lanzamientos.html" class="hover:text-pastelVino transition-colors px-2 py-1">Lanzamientos</a>
                    <a href="merch.html" class="hover:text-pastelVino transition-colors px-2 py-1">La Tienda</a>
                    <a href="index.html#newsletter" class="bg-pastelVino text-white hover:bg-pastelCafe rounded-md px-4 py-1.5 transition-colors shadow-sm">Únete</a>
                </nav>
                <div class="flex items-center gap-4 pt-1">
                    <button id="mobile-menu-btn" class="md:hidden text-3xl text-pastelVino hover:text-pastelCafe focus:outline-none">
                        <i class="fa-solid fa-bars"></i>
                    </button>
                </div>
            </div>
        </header>
    </div>

    <!-- MOBILE MENU RESPONSIVE -->
    <div id="mobile-menu" class="fixed inset-0 z-[200] bg-pastelBeige/98 backdrop-blur-xl flex-col items-center justify-center space-y-8 hidden pt-12 transform transition-transform duration-300">
        <button onclick="toggleMenu()" class="absolute top-6 right-6 text-4xl text-pastelCafe hover:text-pastelVino"><i class="fa-solid fa-xmark"></i></button>
        <span class="font-marker text-4xl text-pastelVino mb-4">Alehna</span>
        <a href="index.html#music" class="text-3xl font-bold font-hand text-darkText hover:text-pastelVino uppercase" onclick="toggleMenu()">Música</a>
        <a href="videos.html" class="text-3xl font-bold font-hand text-darkText hover:text-pastelVino uppercase" onclick="toggleMenu()">Videos</a>
        <a href="biografia.html" class="text-3xl font-bold font-hand text-darkText hover:text-pastelVino uppercase" onclick="toggleMenu()">Biografía</a>
        <a href="lanzamientos.html" class="text-3xl font-bold font-hand text-darkText hover:text-pastelVino uppercase" onclick="toggleMenu()">Lanzamientos</a>
        <a href="merch.html" class="text-3xl font-bold font-hand text-darkText hover:text-pastelVino uppercase" onclick="toggleMenu()">La Tienda</a>
        <a href="index.html#newsletter" class="bg-pastelVino text-white px-8 py-3 rounded-full font-bold uppercase mt-6" onclick="toggleMenu()">Únete</a>
    </div>

    <main class="flex-grow pt-[130px] pb-20 px-4 relative z-10 overflow-hidden">
        <div class="container mx-auto max-w-6xl text-center mt-12">
            <h1 class="text-5xl md:text-7xl font-marker text-pastelCafe mb-16 inline-block transform rotate-1">MÚSICA</h1>
            <div class="mt-4 organic-box p-4 bg-white max-w-4xl mx-auto shadow-md">
                <iframe style="border-radius:12px;" src="https://open.spotify.com/embed/track/6WCIljsn5rcWF699Siq2TM?utm_source=generator" width="100%" height="152" frameBorder="0" loading="eager"></iframe>
            </div>
        </div>
    </main>

    <footer id="footer" class="bg-pastelCafe text-pastelBeige py-12 relative mt-12 bg-pastelBeigeDark">
        <div class="container mx-auto px-4 mt-8 flex flex-col items-center">
            <div class="text-center font-main text-sm font-bold opacity-80 mt-4">© 2026 ALEHNA. TODOS LOS DERECHOS RESERVADOS.</div>
        </div>
    </footer>

    <script src="main.js"></script>
    <script>
        const btn = document.getElementById('mobile-menu-btn');
        const menu = document.getElementById('mobile-menu');
        function toggleMenu() { 
            if(menu.classList.contains('hidden')) {
                menu.classList.remove('hidden'); menu.classList.add('flex');
            } else {
                menu.classList.add('hidden'); menu.classList.remove('flex');
            }
        }
        btn.addEventListener('click', toggleMenu);
    </script>
</body>
</html>
