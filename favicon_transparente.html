<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Hacer Favicon Transparente</title>
    <style>
        body { font-family: sans-serif; background-color: #222; color: white; text-align: center; padding: 50px; }
        .container { max-width: 600px; margin: 0 auto; background: #333; padding: 30px; border-radius: 10px; }
        input[type="file"] { margin: 20px 0; padding: 10px; background: #444; border-radius: 5px; cursor: pointer; }
        canvas { border: 1px dashed #666; margin-top: 20px; background: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAAMUlEQVQ4T2NkYNgvwMDwn4FEYAJi1AwwmIEGDIzhUDWAoYGCgXEMw0HDCIM200k0AQAiLhECb7Q1HwAAAABJRU5ErkJggg=='); }
        .btn { background: #FF007F; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; margin-top: 20px; display: none; text-decoration: none; font-weight: bold;}
        .btn:hover { background: #D10068; }
    </style>
</head>
<body>

<div class="container">
    <h2>Extractor de Fondo (Letras Blancas)</h2>
    <p>1. Sube la imagen del favicon con fondo negro que descargaste.</p>
    
    <input type="file" id="imageInput" accept="image/png, image/jpeg">
    
    <br>
    <p>2. Previsualización (el fondo a cuadros indica transparencia):</p>
    <canvas id="canvas" width="200" height="200"></canvas>
    <br>
    <a id="downloadBtn" class="btn" download="favicon.png">Descargar Favicon Transparente</a>
</div>

<script>
    const imageInput = document.getElementById('imageInput');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const downloadBtn = document.getElementById('downloadBtn');

    imageInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                // Ajustar el tamaño del canvas a la imagen
                canvas.width = img.width;
                canvas.height = img.height;
                
                // Dibujar la imagen original
                ctx.drawImage(img, 0, 0);
                
                // Extraer los píxeles
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;

                // Por cada píxel: 
                // Asumimos que la imagen es texto blanco sobre fondo negro.
                // Reemplazamos todos los colores por BLANCO, y usamos la luminosidad original como CANAL ALFA (transparencia).
                for (let i = 0; i < data.length; i += 4) {
                    const r = data[i];
                    const g = data[i + 1];
                    const b = data[i + 2];
                    
                    // Calcular luminosidad (brillo del pixel)
                    const lum = (r + g + b) / 3;

                    // Establecer color a blanco puro (255, 255, 255)
                    data[i] = 255;
                    data[i + 1] = 255;
                    data[i + 2] = 255;
                    
                    // Establecer transparencia según el brillo (negro = 0 = invisible, blanco = 255 = visible)
                    // Esto mantiene los bordes suaves del pincel perfectamente.
                    data[i + 3] = lum;
                }

                // Volver a poner la imagen modificada en el canvas
                ctx.putImageData(imageData, 0, 0);

                // Mostrar botón de descarga
                downloadBtn.style.display = 'inline-block';
                downloadBtn.href = canvas.toDataURL('image/png');
            }
            img.src = event.target.result;
        }
        reader.readAsDataURL(file);
    });
</script>

</body>
</html>
