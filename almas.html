<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALEHNA | ALMAS ⚡</title>
<!-- OPEN GRAPH -->
<meta property="og:title" content="ALEHNA - ALMAS">
<meta property="og:description" content="¡Escucha ALMAS en tu plataforma favorita!">
<meta property="og:image" content="https://alehnaproject.com/almas/Portada2.jpg.jpeg">
<meta property="og:type" content="website">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=Permanent+Marker&family=Caveat:wght@700&display=swap');

/* RESET */
html, body {
    margin: 0;
    font-family: 'Nunito', sans-serif;
    color: white;
    background-color: #181514;
    overscroll-behavior-y: none;
}

/* FONDO FIJO */
.bg-fijo {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background:
        linear-gradient(rgba(0,0,0,0.8), rgba(24, 21, 20, 0.95)),
        url('bioinicio/DSC_0705.jpg') no-repeat center top;
    background-size: cover;
    z-index: -1;
}

/* LAYOUT */
.layout {
    display: flex;
    flex-direction: column;
    padding: 20px;
}

/* SIDEBAR */
.sidebar {
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.perfil {
    max-width: 320px;
    width: 100%;
}

/* AVATAR */
.avatar-box {
    position: relative;
    display: inline-block;
    animation: fadeIn 1s ease;
}

.avatar {
    width: 200px;
    height: 200px;
    border-radius: 12px;
    border: 3px solid rgba(197, 125, 132, 0.5); /* Pastel Vino */
    box-shadow: 0 0 30px rgba(197, 125, 132, 0.3);
    object-fit: cover;
}

.perfil h3 {
    margin-top: 20px;
    margin-bottom: 5px;
    font-size: 36px;
    font-family: 'Permanent Marker', cursive;
    color: #F9F6F0; /* Pastel Beige */
    letter-spacing: 2px;
}

.perfil p {
    color: #C57D84; /* Pastel Vino */
    font-size: 26px;
    font-family: 'Caveat', cursive;
    margin: 0;
}

/* MICRO CARD */
.micro-card {
    margin-top: 16px;
    padding: 12px;
    background: rgba(255,255,255,0.06);
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(12px);
    font-size: 15px;
}

/* MAIN */
.main {
    width: 100%;
    margin-top: 20px;
}

/* BOTONES */
.btn {
    display: flex;
    justify-content: space-between;
    align-items: center;

    background: rgba(255,255,255,0.08);
    padding: 16px 20px;
    margin: 12px 0;
    border-radius: 16px;

    text-decoration: none;
    color: white;

    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(12px);

    transition: 0.3s;
}

.btn:hover {
    background: rgba(197, 125, 132, 0.25); /* Pastel Vino */
    border-color: rgba(197, 125, 132, 0.6);
    transform: scale(1.02);
}

.left {
    display: flex;
    align-items: center;
    gap: 15px;
    font-weight: bold;
    font-size: 16px;
}

.left i {
    font-size: 26px;
}

.right i {
    opacity: 0.6;
}

/* ICONOS */
.fa-spotify { color: #1DB954; }
.fa-apple { color: #f5f6f5; }
.fa-youtube { color: #ff0000; }
.fa-instagram { color: #E1306C; }
.fa-tiktok { color: #ffffff; }

/* TITULOS */
.section-title {
    margin-top: 30px;
    margin-bottom: 10px;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.6);
    text-align: center;
    font-weight: bold;
}

/* TRABAJOS */
.trabajos {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
    margin-top: 15px;
}

.trabajo-btn {
    display: flex;
    justify-content: center;
    align-items: center;

    padding: 16px;
    border-radius: 14px;

    background: rgba(168, 134, 110, 0.3); /* Pastel Cafe */
    border: 1px solid rgba(168, 134, 110, 0.5);

    text-decoration: none;
    color: white;
    font-size: 15px;
    font-weight: bold;
    font-family: 'Nunito', sans-serif;

    backdrop-filter: blur(10px);
    transition: 0.3s;
}

.trabajo-btn:hover {
    background: rgba(168, 134, 110, 0.6);
    transform: scale(1.02);
}

/* FOOTER */
.footer {
    text-align: center;
    margin-top: 40px;
    margin-bottom: 30px;
    font-size: 12px;
    color: rgba(255,255,255,0.4);
}

/* 💻 RESPONSIVE PC */
@media (min-width: 900px) {
    .layout {
        flex-direction: row;
        max-width: 900px;
        margin: auto;
        padding: 40px;
        gap: 60px;
        align-items: center;
        min-height: 90vh;
    }
    .sidebar {
        width: 45%;
    }
    .main {
        width: 55%;
        max-width: 500px;
    }
    .avatar {
        width: 260px;
        height: 260px;
    }
    .perfil h3 {
        font-size: 48px;
    }
    .perfil p {
        font-size: 32px;
    }
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>
<div class="bg-fijo"></div>

<div class="layout">
    <!-- IZQUIERDA -->
    <div class="sidebar">
        <div class="perfil">
            <div class="avatar-box">
                <img src="almas/Portada2.jpg.jpeg" class="avatar" alt="ALMAS Cover">
            </div>
            <h3>ALEHNA</h3>
            <p>ALMAS</p>
            <div class="micro-card">
                ¡El nuevo sencillo ya disponible! ⚡
            </div>
        </div>
    </div>

    <!-- DERECHA -->
    <div class="main">
        <div class="section-title">Escuchar Ahora</div>

        <a href="#" onclick="openApp('https://open.spotify.com/intl-es/track/3UksUYGl1APORfhWSNPsov?si=84bdad7771bb406b')" class="btn">
            <div class="left">
                <i class="fa-brands fa-spotify"></i>
                <span>Spotify</span>
            </div>
            <div class="right"><i class="fa-solid fa-chevron-right"></i></div>
        </a>

        <a href="#" onclick="openApp('https://music.apple.com/co/album/almas-feat-sur-t%C3%B3nica-single/1891490188')" class="btn">
            <div class="left">
                <i class="fa-brands fa-apple"></i>
                <span>Apple Music</span>
            </div>
            <div class="right"><i class="fa-solid fa-chevron-right"></i></div>
        </a>

        <a href="#" onclick="openApp('https://youtu.be/8AOeZrQ1KjY?si=y2dYhy7miUcvGqCl')" class="btn">
            <div class="left">
                <i class="fa-brands fa-youtube"></i>
                <span>YouTube</span>
            </div>
            <div class="right"><i class="fa-solid fa-chevron-right"></i></div>
        </a>

        <div class="section-title">Redes Oficiales</div>

        <a href="#" onclick="openApp('https://www.instagram.com/alehnaoficial')" class="btn">
            <div class="left">
                <i class="fa-brands fa-instagram"></i>
                <span>Instagram</span>
            </div>
            <div class="right"><i class="fa-solid fa-chevron-right"></i></div>
        </a>
        <a href="#" onclick="openApp('https://www.tiktok.com/@alehnaoficial')" class="btn">
            <div class="left">
                <i class="fa-brands fa-tiktok"></i>
                <span>TikTok</span>
            </div>
            <div class="right"><i class="fa-solid fa-chevron-right"></i></div>
        </a>

        <div class="trabajos">
            <a href="contacto.html" class="trabajo-btn">
                <i class="fa-regular fa-envelope" style="margin-right: 10px;"></i> Contacto
            </a>
        </div>
    </div>
</div>

<div class="footer">
    © 2026 ALEHNA · Todos los derechos reservados
</div>

<script>
function openApp(url) {
    window.location.href = url;
}
</script>
</body>
</html>
